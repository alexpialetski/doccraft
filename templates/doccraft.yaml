# doccraft configuration
#
# This file is **yours** — doccraft never overwrites it. Every skill installed
# by doccraft reads values from here at invocation time; any key you omit
# falls back to the built-in default in the skill body. Deleting this file
# entirely makes every skill use its defaults.
#
# Adding to a list (e.g. story.areas) teaches the matching skill a new valid
# value without touching its SKILL.md. That's the point — your vocabulary
# survives `doccraft update`.

# Root folder for all doccraft docs, relative to project root.
# Change this if your docs don't live under `docs/`. Re-run `doccraft update`
# after changing it so Cursor rule globs are regenerated with the new path.
docsDir: docs

story:
  # Tag vocabulary. Stories in <docsDir>/stories/ use prefixed tags
  # (area:/slice:/theme:); these lists name the valid values under each
  # prefix for this project.
  areas: [api, cli, auth, data, infra, schemas]
  slices: [ui, admin, onboarding]
  themes: [observability, performance, security, docs, testing]

  id:
    # Filename tier prefixes (e.g. `p0-` / `p1-` in p0-payment-retry.md).
    # Empty list = no tier prefix convention.
    tiers: [p0, p1, p2, p3, p4]
    # Regex for valid story `id:` values in YAML frontmatter. Accepts both
    # P-tier ordinals ("P0.3") and kebab-case slugs ("story-2026-001",
    # "spike-foo") by default.
    pattern: '^(P\d+(\.\d+)?|[a-z][a-z0-9-]+)$'

queue:
  # Heading text for the two tables `doccraft-queue-audit` reads. Rename
  # here if your project uses different headings — the skill will find
  # tables by heading text, not position.
  tables:
    suggestedOrder: Suggested order
    platformSpikes: Platform spikes

queueAudit:
  # Priority order for the lane heuristic in `doccraft-queue-audit`'s
  # parallel-waves pass. First match wins when assigning a story to a
  # lane. Set to [slice, area] if your project groups work primarily by
  # product surface rather than subsystem.
  laneFrom: [area, slice]

  # Scale thresholds. When an audit would touch more story files than
  # `maxStoryFiles` or reorder more than `maxQueueReorderPct` percent of
  # the suggested-order table, the skill stops and asks for confirmation
  # before applying. Raise these for larger projects; lower for stricter
  # containment.
  scale:
    maxStoryFiles: 5
    maxQueueReorderPct: 50

sessionWrap:
  # Which capture categories `doccraft-session-wrap` considers in scope.
  # Set a category to `false` if your project does not track that kind
  # of doc — session-wrap will skip the row entirely rather than
  # propose a new folder.
  capture:
    research: true
    reference: true
    business: false
