# doccraft configuration — tailored for doccraft itself (the dogfood).
#
# This file is owned by the project, not by doccraft. `doccraft update`
# never overwrites it. Every installed skill reads values here at
# invocation time; any key you omit falls back to the in-skill default.
# Deleting this file makes every skill use its defaults.
#
# For a fresh project, the starter values live in `templates/docs/
# config.yaml` in the doccraft package. Edits below reflect choices
# specific to the doccraft repo.

# Root folder for all doccraft docs, relative to project root.
docsDir: docs

story:
  # Subsystem tags, aligned with the conventional-commit scopes used
  # in this repo (`feat(cli):`, `feat(skills):`, `docs(scope):` …).
  areas:
    - cli        # Commander-wired command surface (init, update, --tools)
    - skills     # skill templates and install pipeline
    - rules      # Cursor rule stubs (.mdc)
    - config     # docs/config.yaml layer + skill-side consumers
    - openspec   # @fission-ai/openspec subprocess bridge
    - scaffold   # docs/ scaffolding (templates/docs/ → docs/)

  # doccraft is a CLI tool; no user-facing product slices.
  slices: []

  # Themes that recur in this project's stories. `install` appears in
  # P1.2; `docs` and `testing` in several others. `ux` for CLI UX work
  # (prompt picker, stale-cursor advisory messaging, and similar).
  themes:
    - docs
    - testing
    - install
    - ux

  id:
    # doccraft uses p0–p4 consistently.
    tiers: [p0, p1, p2, p3, p4]
    # Accepts both P-tier ordinals ("P1.2") and kebab-case slugs for
    # spikes. doccraft has used P-tier exclusively so far, but the
    # pattern stays permissive in case a spike story lands later.
    pattern: '^(P\d+(\.\d+)?|[a-z][a-z0-9-]+)$'

queue:
  tables:
    suggestedOrder: Suggested order
    platformSpikes: Platform spikes

queueAudit:
  # doccraft stories use `area:` tags almost exclusively; `slice:` falls
  # back only because `slices: []` means the lane heuristic never finds
  # a slice tag. Concrete effect: lane = first `area:*` tag, or `misc`
  # when none is set.
  laneFrom: [area, slice]

  # Low thresholds for a small project. An audit that would touch more
  # than 5 story files or reorder more than half the Suggested order
  # table pauses for confirmation — intentional containment for a repo
  # that currently has fewer than 10 stories total.
  scale:
    maxStoryFiles: 5
    maxQueueReorderPct: 50

sessionWrap:
  # doccraft does not maintain `docs/research/`, `docs/reference/`, or
  # `docs/business/` trees. Disable these capture categories so
  # `doccraft-session-wrap` doesn't propose creating folders this
  # project has deliberately chosen not to use. If/when one becomes
  # useful, flip the relevant flag and the skill will surface it.
  capture:
    research: false
    reference: false
    business: false
